# hugo.toml
baseURL = 'https://infinite-improbability-drive.vercel.app/' # Or your chosen domain
languageCode = 'en-ca'
title = 'The Infinite Improbability Drive'

# hugo.toml additions
[params]
    env = "production"
    title = "The Infinite Improbability Drive"
    description = "18 years at Google. Brain the size of a planet. Currently wrestling with RAG."
    author = "Maciej Kalisiak"

    # Enable the "Search" button (H2G2 fans love a good search for the Question)
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true

    [params.profileMode]
        enabled = true
        title = "The Infinite Improbability Drive"
        subtitle = "Probability of this blog being useful: 2^276,709 to 1 against."
        imageUrl = "assets/don-t-panic--dan-gerhard-01.png" # Swap for a custom Zaphod/Marvin icon later

    # To show a list of posts on the home page, ensure this is NOT active 
    # OR set up homeInfoParams instead.
    [params.homeInfoParams]
        Title = "Welcome to the Heart of Gold"
        Content = "Documenting the transition to AI and late-stage startups."

    [params.socialIcons]
        - name = "github"
          url = "https://github.com/maciekk"

[[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

[[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"
